<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT-ZERTZ | JS Toolbox</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        h1 {
            color: #f0f6fc;
            margin-bottom: 0.5rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .repo-link {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        #tools-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .tool-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            border-color: #8b949e;
        }

        .tool-info h3 {
            margin: 0 0 0.25rem 0;
            color: #f0f6fc;
        }

        .tool-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .btn-view {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-view:hover {
            background-color: #30363d;
        }

        .loading, .error {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 2rem;
        }
        
        .error {
            color: #f85149;
        }
    </style>
</head>
<body>

    <header>
        <h1>JS Toolbox</h1>
        <p>A collection of my JavaScript utilities and tools.</p>
        <p class="repo-link">Live tracking: <a href="https://github.com/TT-ZERTZ/JS-TOOLBOX" target="_blank">TT-ZERTZ/JS-TOOLBOX</a></p>
    </header>

    <main id="tools-container">
        <div class="loading">Fetching latest tools from GitHub...</div>
    </main>

    <script>
        const REPO_OWNER = 'TT-ZERTZ';
        const REPO_NAME = 'JS-TOOLBOX';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        async function fetchRepoContents() {
            const container = document.getElementById('tools-container');
            
            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`GitHub API responded with status: ${response.status}`);
                }
                
                const items = await response.json();
                
                // Filter to only display JavaScript files (or folders if you prefer)
                const jsFiles = items.filter(item => item.type === 'file' && item.name.endsWith('.js'));
                
                if (jsFiles.length === 0) {
                    container.innerHTML = '<div class="loading">No JavaScript files found in the root directory.</div>';
                    return;
                }
                
                // Clear loading text
                container.innerHTML = '';
                
                // Dynamically build the cards
                jsFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'tool-card';
                    
                    // Format a cleaner title from the file name (optional)
                    const cleanName = file.name.replace('.js', '');
                    
                    card.innerHTML = `
                        <div class="tool-info">
                            <h3>${cleanName}</h3>
                            <p>${file.name} • ${(file.size / 1024).toFixed(2)} KB</p>
                        </div>
                        <a href="${file.html_url}" target="_blank">
                            <button class="btn-view">View Code</button>
                        </a>
                    `;
                    
                    container.appendChild(card);
                });
                
            } catch (error) {
                console.error('Error fetching data:', error);
                container.innerHTML = `<div class="error">Failed to load toolbox contents. Please try again later.</div>`;
            }
        }

        // Run on page load
        fetchRepoContents();
    </script>
</body>
</html>
